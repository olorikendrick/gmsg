name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install OpenSSL
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Run tests
        run: cargo test

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache OpenSSL (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/cache@v4
        id: cache-openssl-linux
        with:
          path: /usr/lib/x86_64-linux-gnu/libssl*
          key: openssl-linux-${{ runner.os }}

      - name: Install OpenSSL (Linux)
        if: matrix.os == 'ubuntu-latest' && steps.cache-openssl-linux.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Cache OpenSSL (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/cache@v4
        id: cache-openssl-macos
        with:
          path: /usr/local/opt/openssl
          key: openssl-macos-${{ runner.os }}

      - name: Install OpenSSL (macOS)
        if: matrix.os == 'macos-latest' && steps.cache-openssl-macos.outputs.cache-hit != 'true'
        run: brew install openssl

      - name: Set OpenSSL env (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          echo "OPENSSL_DIR=$(brew --prefix openssl)" >> $GITHUB_ENV
          echo "OPENSSL_NO_VENDOR=1" >> $GITHUB_ENV

      - name: Cache OpenSSL (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        id: cache-openssl-windows
        with:
          path: C:\Program Files\OpenSSL
          key: openssl-windows-${{ runner.os }}

      - name: Install OpenSSL (Windows)
        if: matrix.os == 'windows-latest' && steps.cache-openssl-windows.outputs.cache-hit != 'true'
        run: choco install openssl

      - name: Set OpenSSL env (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "OPENSSL_DIR=C:\Program Files\OpenSSL" >> $env:GITHUB_ENV
          echo "OPENSSL_NO_VENDOR=1" >> $env:GITHUB_ENV

      - name: Install cross
        if: matrix.cross
        uses: actions/cache@v4
        id: cache-cross
        with:
          path: ~/.cargo/bin/cross
          key: cross-${{ runner.os }}

      - name: Build cross binary
        if: matrix.cross && steps.cache-cross.outputs.cache-hit != 'true'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Extract changelog
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BODY=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf gmsg-${{ github.ref_name }}-${{ matrix.target }}.tar.gz gmsg
          mv gmsg-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ../../../

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive gmsg.exe gmsg-${{ github.ref_name }}-${{ matrix.target }}.zip
          mv gmsg-${{ github.ref_name }}-${{ matrix.target }}.zip ../../../

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.BODY }}
          files: gmsg-${{ github.ref_name }}-${{ matrix.target }}.*
